[package]
name = "laniakea-engine"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "3", features = ["napi9"] }
napi-derive = "3"
serde = { version = "1", features = ["derive"] }

[build-dependencies]
napi-build = "2"

[lints.clippy]
all = { level = "deny" }
pedantic = { level = "deny" }
