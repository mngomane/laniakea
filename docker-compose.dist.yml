services:
  postgres:
    image: postgres:16
    container_name: laniakea-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: laniakea
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: laniakea
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
